<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso - TuMotoExpress.cl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .success-badge {
            background: #4CAF50;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .message {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .order-details {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 25px 0;
            border-left: 5px solid #4CAF50;
        }

        .order-number {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #ddd;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-weight: bold;
        }

        .whatsapp-button {
            background: #25D366;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 15px 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .whatsapp-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .back-button {
            background: #333;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            background: #555;
        }

        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <span class="success-badge">PAGO EXITOSO</span>
        <h1>¡Gracias por tu pago!</h1>
        
        <div class="message">
            Tu transacción se ha completado exitosamente. Hemos recibido tu pago y pronto estaremos en contacto.
        </div>

        <div class="order-details">
            <div style="font-size: 14px; color: #666; margin-bottom: 5px;">NÚMERO DE ORDEN</div>
            <div class="order-number" id="ordenNumero">CARGANDO...</div>
            
            <div style="margin-top: 15px;">
                <div class="info-item">
                    <span class="info-label">Fecha y hora:</span>
                    <span class="info-value" id="fechaActual"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Estado:</span>
                    <span class="info-value" style="color: #4CAF50;">APROBADO</span>
                </div>
            </div>
        </div>

        <button class="whatsapp-button" id="btnWhatsapp">
            <span>📱</span> Contactar por WhatsApp
        </button>

        <a href="/" class="back-button">← Volver al cotizador</a>

        <div class="footer">
            TuMotoExpress.cl - Envíos rápidos y seguros
        </div>
    </div>

    <script>
        // Obtener el número de orden de la URL
        const params = new URLSearchParams(window.location.search);
        const orden = params.get('orden') || 'No disponible';
        
        document.getElementById('ordenNumero').textContent = orden;
        
        // Mostrar fecha actual
        const fecha = new Date();
        const opciones = { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric', 
            hour: '2-digit', 
            minute: '2-digit' 
        };
        document.getElementById('fechaActual').textContent = fecha.toLocaleDateString('es-CL', opciones);

        // Botón de WhatsApp
        document.getElementById('btnWhatsapp').onclick = () => {
            const mensaje = encodeURIComponent(`Hola! Acabo de realizar el pago de la orden ${orden}. Quedo atento a la confirmación.`);
            window.open(`https://wa.me/56942325524?text=${mensaje}`, '_blank');
        };
    </script>
</body>
</html>
