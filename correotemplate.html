<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu cotización en TuMotoExpress.cl</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
        }
        table {
            border-collapse: collapse;
            mso-table-lspace: 0;
            mso-table-rspace: 0;
        }
        td, th {
            padding: 0;
        }
    </style>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4;">

<table width="100%" bgcolor="#f4f4f4">
<tr>
<td align="center" style="padding:20px;">

<table width="600" bgcolor="#ffffff" style="border-radius:16px; max-width:600px; width:100%;">

<tr>
<td bgcolor="#000000" style="padding:25px 15px; text-align:center; border-bottom:3px solid #ff4500;">
<h1 style="color:#ffffff; margin:0; font-size:32px;">TuMotoExpress.cl</h1>
</td>
</tr>

<tr>
<td style="padding:20px 18px;">

<!-- TARJETA DE PRECIOS CON MARCA DE AGUA -->
<table width="100%" bgcolor="#f9f9f9" style="border-radius:14px; border:1px solid #e0e0e0; margin:16px 0;">
<tr>
<td style="padding:16px; position:relative;">

<!-- MARCA DE AGUA -->
<table width="100%">
<tr>
<td align="center"
    style="position:absolute;
           left:0;
           right:0;
           top:50%;
           transform:translateY(-50%);
           opacity:1;
           pointer-events:none;">
<img src="https://res.cloudinary.com/dkg3vbuel/image/upload/v1772490686/logo_eurxwy.png"
     width="250"
     style="display:block; margin:auto;">
</td>
</tr>
</table>

<!-- CONTENIDO NORMAL -->
<table width="100%" style="margin:12px 0; position:relative; z-index:2;">
<tr>
<td style="padding:10px 3px; border-bottom:1px dashed #dddddd;">Neto:</td>
<td style="padding:10px 3px; border-bottom:1px dashed #dddddd; text-align:right; font-weight:600;">
${{neto}}
</td>
</tr>

{{#if descuento}}
<tr>
<td style="padding:10px 3px; border-bottom:1px dashed #dddddd; color:#27ae60;">
🎟️ Descuento aplicado:
</td>
<td style="padding:10px 3px; border-bottom:1px dashed #dddddd; text-align:right; font-weight:600; color:#27ae60;">
-${{descuento}}
</td>
</tr>
{{/if}}

<tr>
<td style="padding:10px 3px; border-bottom:1px dashed #dddddd;">IVA (19%):</td>
<td style="padding:10px 3px; border-bottom:1px dashed #dddddd; text-align:right; font-weight:600;">
${{iva}}
</td>
</tr>
</table>

<!-- TOTAL -->
<table width="100%" bgcolor="#000000" style="border-radius:14px; margin:20px 0 12px; position:relative; z-index:2;">
<tr>
<td style="padding:16px 12px; text-align:center;">
<div style="font-size:14px; color:#ffffff;">TOTAL DEL SERVICIO</div>
<div style="font-size:38px; font-weight:bold; color:#ff4500;">
${{total}}
</div>
</td>
</tr>
</table>

</td>
</tr>
</table>

</td>
</tr>
</table>

</td>
</tr>
</table>

</body>
</html>
