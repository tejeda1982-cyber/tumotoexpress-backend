<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador TuMotoExpress.cl</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f6fa;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}
body::before, body::after {
  content: "";
  position: fixed;
  top: 50%;
  width: 540px;
  height: 540px;
  background: url('logo.png') no-repeat center;
  background-size: contain;
  opacity: 1;
  z-index: -1;
  pointer-events: none;
}
body::before { left: 0; transform: translateY(-50%); }
body::after { right: 0; transform: translateY(-50%); }

.container {
  background: white;
  padding: 30px 20px;
  border-radius: 20px;
  width: 95%;
  max-width: 480px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.2);
  text-align: center;
  position: relative;
  z-index: 1;
  margin: 0 20px;
}

h2 { font-size: 24px; margin: 0 0 15px 0; color: #111; }

.condiciones-servicio {
  background: #f8f9fa;
  border-radius: 30px;
  padding: 8px 12px 10px 12px;
  margin: 0 auto 20px auto;
  max-width: 380px;
  display: inline-block;
  border: 1px solid #eaeaea;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
}

.condiciones-header { display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 8px; }
.condiciones-header span { font-size: 16px; }
.condiciones-header h3 { margin: 0; color: #555; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }

.condiciones-labels { display: flex; justify-content: space-around; margin-bottom: 2px; padding: 0 5px; }
.label-item { font-size: 0.65rem; color: #777; text-transform: uppercase; font-weight: 500; letter-spacing: 0.2px; text-align: center; flex: 1; }
.condiciones-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.condicion-item { display: inline-flex; align-items: center; gap: 3px; background: white; padding: 4px 10px; border-radius: 40px; border: 1px solid #f0f0f0; font-size: 0.8rem; white-space: nowrap; }
.condicion-icon { font-size: 14px; }
.condicion-texto { color: #444; font-weight: 400; }
.condicion-texto strong { color: #ff4500; font-weight: 600; margin: 0 2px; }
.condicion-mini { font-size: 0.7rem; color: #888; margin-left: 2px; font-weight: normal; }

input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; transition: all 0.2s; box-sizing: border-box; }
input:focus { border-color: #111; box-shadow: 0 0 8px rgba(0,0,0,0.1); outline: none; }
small { display: block; margin-bottom: 8px; color: #666; font-size: 13px; }
button { width: 100%; padding: 14px; margin-top: 8px; border-radius: 12px; border: none; font-size: 15px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
button:hover { opacity: 0.9; transform: translateY(-1px); }
button:active { transform: translateY(0); }
.btn-cotizar { background: #111; color: white; }
.btn-agregar { background: #4a4a4a; color: white; margin-top: 5px; font-size: 13px; padding: 10px; }
.btn-whatsapp { background: #25D366; color: white; display: none; margin-top: 15px; }
.btn-correo { background: #1a73e8; color: white; display: none; margin-top: 15px; }
.btn-pagar { background: #ff4500; color: white; display: none; margin-top: 15px; }

.resultado { margin-top: 20px; background: #f2f2f2; padding: 18px; border-radius: 14px; font-size: 15px; display: none; text-align: left; position: relative; overflow: hidden; }

.destino-adicional { display: flex; align-items: center; gap: 8px; margin: 8px 0; background: #f8f9fa; padding: 8px; border-radius: 8px; border-left: 3px solid #ff4500; }
.destino-adicional input { flex: 1; margin: 0; padding: 12px; font-size: 14px; }
.btn-eliminar { width: auto; padding: 8px 12px; margin: 0; background: #dc3545; color: white; font-size: 13px; }

.destinos-lista { margin: 10px 0 15px 0; padding-left: 20px; }
.destinos-lista li { margin: 5px 0; color: #333; font-size: 14px; }

.tramo-resumen { background: #f9f9f9; padding: 10px; margin: 8px 0; border-left: 4px solid #ff4500; border-radius: 8px; }
.tramo-resumen strong { color: #333; font-size: 14px; display: block; margin-bottom: 6px; }
.tramo-detalle { display: flex; gap: 12px; font-size: 12px; color: #666; flex-wrap: wrap; margin-top: 5px; }
.tramo-detalle span { background: #f0f0f0; padding: 3px 10px; border-radius: 20px; font-weight: 500; }

.resumen-total { background: #e8f4fd; padding: 10px; border-radius: 8px; margin: 12px 0; text-align: center; font-weight: bold; font-size: 14px; }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 9998; animation: fadeIn 0.3s ease; }
.modal-contenido { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 9999; max-width: 350px; width: 90%; text-align: center; animation: slideUp 0.3s ease; }
.modal-icono { font-size: 60px; margin-bottom: 15px; }
.modal-titulo { font-size: 24px; color: #333; margin-bottom: 10px; font-weight: 600; }
.modal-mensaje { color: #666; margin-bottom: 25px; line-height: 1.5; font-size: 15px; }
.modal-btn-cerrar { background: #ff4500; color: white; padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: all 0.3s; width: 100%; max-width: 200px; margin: 0 auto; display: block; }
.modal-btn-cerrar:hover { background: #ff5722; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,69,0,0.2); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translate(-50%, -30%); } to { opacity: 1; transform: translate(-50%, -50%); } }
</style>
</head>
<body>

<div id="webpayModal" class="modal-contenido">
  <div class="modal-icono">🔧</div>
  <div class="modal-titulo">WebPay próximamente</div>
  <div class="modal-mensaje">El sistema de pagos con tarjeta estará disponible pronto.</div>
  <button onclick="cerrarModalWebPay()" class="modal-btn-cerrar">✖ Cerrar</button>
</div>
<div id="modalOverlay" class="modal-overlay"></div>

<div class="container">
  <h2>🚀 TuMotoExpress.cl</h2>

  <div class="condiciones-servicio">
    <div class="condiciones-header">
      <span>📋</span>
      <h3>Condiciones de servicio</h3>
    </div>
    <div class="condiciones-labels">
      <span class="label-item">Medida máxima</span>
      <span class="label-item">Peso máximo</span>
      <span class="label-item">Tiempo de espera</span>
    </div>
    <div class="condiciones-grid">
      <div class="condicion-item"><span class="condicion-icon">📏</span><span class="condicion-texto"><strong>30x30x30</strong><span class="condicion-mini">cm</span></span></div>
      <div class="condicion-item"><span class="condicion-icon">⚖️</span><span class="condicion-texto"><strong>3</strong><span class="condicion-mini">kilos</span></span></div>
      <div class="condicion-item"><span class="condicion-icon">⏱️</span><span class="condicion-texto"><strong>$200</strong><span class="condicion-mini">/min</span></span></div>
    </div>
  </div>

  <input type="text" id="inicio" placeholder="Dirección de origen">
  
  <div id="destinosContainer">
    <div class="destino-adicional" id="destino-1">
      <input type="text" class="destino-input" placeholder="Dirección de destino 1">
    </div>
  </div>
  <button class="btn-agregar" onclick="agregarDestino()">➕ Agregar otro destino</button>
  
  <input type="text" id="codigoCupon" placeholder="Cupón (opcional)">
  <small>Incluye comuna para mayor precisión</small>

  <button class="btn-cotizar" onclick="cotizar()">Cotizar</button>

  <div class="spinner" id="spinner"></div>
  <div id="resultado" class="resultado"></div>

  <div id="camposCliente" style="display:none;">
    <input type="text" id="nombreCliente" placeholder="Nombre completo">
    <input type="email" id="correoCliente" placeholder="Correo electrónico">
    <input type="tel" id="telefonoCliente" placeholder="Teléfono (ej: 912345678)">
    <button id="btnSolicitarServicio" class="btn-whatsapp">📱 Solicitar servicio</button>
    <button id="btnEnviarCorreo" class="btn-correo">📧 Enviar cotización por correo</button>
    <button id="btnPagar" class="btn-pagar">💳 Pagar con WebPay</button>
  </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7ExvZ0pJBjs37LHwbOcWrUqpxg_V78mk&libraries=places&language=es" defer></script>
<script>
let contadorDestinos = 1;

function mostrarModalWebPay() {
  document.getElementById('modalOverlay').style.display = 'block';
  document.getElementById('webpayModal').style.display = 'block';
}
function cerrarModalWebPay() {
  document.getElementById('modalOverlay').style.display = 'none';
  document.getElementById('webpayModal').style.display = 'none';
}

function initAutocomplete() {
  const options = { types: ["geocode","establishment"], componentRestrictions:{ country:"cl" }, fields:["formatted_address","geometry","name"] };
  new google.maps.places.Autocomplete(document.getElementById("inicio"), options);
  document.querySelectorAll('.destino-input').forEach(input => new google.maps.places.Autocomplete(input, options));
}

function agregarDestino() {
  contadorDestinos++;
  const container = document.getElementById('destinosContainer');
  const nuevoDestino = document.createElement('div');
  nuevoDestino.className = 'destino-adicional';
  nuevoDestino.id = `destino-${contadorDestinos}`;
  nuevoDestino.innerHTML = `<input type="text" class="destino-input" placeholder="Dirección de destino ${contadorDestinos}"><button class="btn-eliminar" onclick="eliminarDestino(${contadorDestinos})">✖</button>`;
  container.appendChild(nuevoDestino);
  const options = { types:["geocode","establishment"], componentRestrictions:{ country:"cl" }, fields:["formatted_address","geometry","name"] };
  new google.maps.places.Autocomplete(nuevoDestino.querySelector('input'), options);
}

function eliminarDestino(id) {
  const elemento = document.getElementById(`destino-${id}`);
  if (elemento && document.querySelectorAll('.destino-adicional').length>1) { elemento.remove(); reenumerarDestinos(); } 
  else { alert('Debe haber al menos un destino'); }
}
function reenumerarDestinos() {
  const destinos = document.querySelectorAll('.destino-adicional');
  destinos.forEach((destino,index)=>{
    const input = destino.querySelector('.destino-input');
    const nuevoNumero=index+1;
    input.placeholder = `Dirección de destino ${nuevoNumero}`;
    destino.id = `destino-${nuevoNumero}`;
    destino.querySelector('.btn-eliminar').setAttribute('onclick', `eliminarDestino(${nuevoNumero})`);
  });
  contadorDestinos = destinos.length;
}
function obtenerTodosLosDestinos() {
  const destinos=[];
  document.querySelectorAll('.destino-input').forEach(input=>{if(input.value.trim()){destinos.push(input.value.trim());}});
  return destinos;
}

function obtenerMensajeHoraEstimado() {
  const ahora=new Date();
  const options={ timeZone:'America/Santiago', year:'numeric', month:'numeric', day:'numeric', hour:'numeric', minute:'numeric', hour12:false };
  const formatter=new Intl.DateTimeFormat('es-CL', options);
  const parts=formatter.formatToParts(ahora);
  let dia=0,hora=0,minutos=0;
  parts.forEach(part=>{if(part.type==='day') dia=parseInt(part.value); if(part.type==='hour') hora=parseInt(part.value); if(part.type==='minute') minutos=parseInt(part.value);});
  const fechaChile=new Date(ahora.toLocaleString('en-US',{ timeZone:'America/Santiago' }));
  const diaSemana=fechaChile.getDay();
  const diasSemana=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  function sumar80Minutos(fecha){return new Date(fecha.getTime()+80*60000);}
  if(diaSemana>=1 && diaSemana<=5){
    if(hora>=9 && (hora<15 || (hora===15 && minutos<=40))){
      const fechaEstimado=sumar80Minutos(fechaChile);
      const horaEst=fechaEstimado.getHours().toString().padStart(2,'0');
      const minEst=fechaEstimado.getMinutes().toString().padStart(2,'0');
      return `Podemos gestionar tu servicio a partir de las ${horaEst}:${minEst} hrs. (hora Chile)`;
    }
  }
  if(diaSemana>=1 && diaSemana<=5 && hora<9){ return `Gracias por cotizar en TuMotoExpress.cl. En este momento nos encontramos fuera de horario de atención, pero podemos gestionar tu envío para el día de hoy ${diasSemana[diaSemana]} durante la mañana.`; }
  if(diaSemana>=1 && diaSemana<=4 && (hora>15 || (hora===15 && minutos>40))){ return `Gracias por cotizar en TuMotoExpress.cl. En este momento nos encontramos fuera de horario de atención, pero podríamos agendar tu envío para el día de mañana ${diasSemana[diaSemana+1]} durante la mañana.`; }
  if(diaSemana===5 && (hora>15 || (hora===15 && minutos>40))){ return `Gracias por cotizar en TuMotoExpress.cl. Nos encontramos fuera de horario comercial, pero podemos agendar tu envío el día lunes durante la mañana.`; }
  if(diaSemana===6||diaSemana===0){ return `Gracias por cotizar en TuMotoExpress.cl. Nos encontramos fuera de horario comercial, pero podemos agendar tu envío el día lunes durante la mañana.`; }
  return `Gracias por cotizar en TuMotoExpress.cl. Te contactaremos a la brevedad.`;
}

async function cotizar() {
  const inicio=document.getElementById("inicio").value;
  const destinos=obtenerTodosLosDestinos();
  const codigo_cupon=document.getElementById("codigoCupon").value.trim().toUpperCase();
  if(!inicio){alert("❌ Completa la dirección de origen");return;}
  if(destinos.length===0){alert("❌ Agrega al menos un destino");return;}
  const spinner=document.getElementById("spinner"); spinner.style.display="block";
  try{
    const response=await fetch("/cotizar",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({inicio,destinos,cupon:codigo_cupon,nombre:document.getElementById("nombreCliente").value,correo:document.getElementById("correoCliente").value,telefono:document.getElementById("telefonoCliente").value})});
    const data=await response.json();
    spinner.style.display="none";
    if(data.error){alert("❌ "+data.error);return;}
    const resultadoDiv=document.getElementById("resultado"); resultadoDiv.style.display="block";
    let html='';
    html+=`<strong>📍 Origen:</strong> ${data.origen}<br><br>`;
    html+=`<strong>📋 Destinos ingresados (${destinos.length}):</strong><br>`;
    html+=`<ol class="destinos-lista" style="margin:5px 0 15px 20px;">`;
    destinos.forEach((destino,index)=>{html+=`<li><strong>Destino ${index+1}:</strong> ${destino}</li>`;});
    html+=`</ol>`;
    html+=`<strong>🛵 Tramos del recorrido:</strong><br>`;
    data.tramos.forEach((tramo,index)=>{
      html+=`<div class="tramo-resumen"><strong>🚚 Tramo ${index+1}: ${tramo.desde} → ${tramo.direccion}</strong><div class="tramo-detalle"><span>📏 ${tramo.distancia_km.toFixed(2)} km</span><span>⏱️ ${tramo.tiempo_minutos} min</span><span>💰 $${tramo.precio.toLocaleString('es-CL')}</span></div></div>`;
    });
    html+=`<div class="resumen-total"><div>📏 Distancia total: ${data.distancia_total_km.toFixed(2)} km</div><div>⏱️ Tiempo total: ${data.tiempo_total_minutos} min</div></div>`;
    html+=`<em>${obtenerMensajeHoraEstimado()}</em>`;
    resultadoDiv.innerHTML=html;
    document.getElementById("camposCliente").style.display="block";

    // Botones WhatsApp y correo
    const telefono="56942325524";
    let mensajeTramos='';
    data.tramos.forEach((tramo,index)=>{mensajeTramos+=`\nTramo ${index+1}: ${tramo.desde} → ${tramo.direccion} (${tramo.distancia_km.toFixed(2)} km - $${tramo.precio.toLocaleString('es-CL')})`;});
    const mensaje=encodeURIComponent(`Hola, solicito el servicio de TuMotoExpress.cl\nOrigen: ${data.origen}${mensajeTramos}\n\nTotal: $${data.total.toLocaleString('es-CL')}\n\n${obtenerMensajeHoraEstimado()}`);
    const btnSolicitar=document.getElementById("btnSolicitarServicio"); btnSolicitar.style.display="block"; btnSolicitar.onclick=()=>window.open(`https://wa.me/${telefono}?text=${mensaje}`,"_blank");
    const btnCorreo=document.getElementById("btnEnviarCorreo"); btnCorreo.style.display="block"; btnCorreo.onclick=async()=>{
      const nombre=document.getElementById("nombreCliente").value;
      const correo=document.getElementById("correoCliente").value;
      const telefonoC=document.getElementById("telefonoCliente").value;
      if(!nombre||!correo||!telefonoC){alert("❌ Completa todos los datos del cliente");return;}
      const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/; if(!emailRegex.test(correo)){alert("❌ Ingresa un correo válido");return;}
      const telefonoRegex=/^[0-9]{9}$/; if(!telefonoRegex.test(telefonoC)){alert("❌ Ingresa un teléfono válido de 9 dígitos");return;}
      try{const response=await fetch("/enviar-correo",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nombre,correo,telefono:telefonoC,cotizacion:data})}); const result=await response.json(); if(result.error){alert("❌ Error: "+result.error);} else{alert("✅ ¡Correo enviado correctamente!");}}catch(err){console.error(err);alert("❌ Error al enviar el correo");}
    };

    const btnPagar=document.getElementById("btnPagar"); btnPagar.style.display="block"; btnPagar.onclick=function(){
      const nombre=document.getElementById("nombreCliente").value;
      const correo=document.getElementById("correoCliente").value;
      const telefono=document.getElementById("telefonoCliente").value;
      if(!nombre||!correo||!telefono){alert("❌ Completa todos los datos del cliente");return;}
      mostrarModalWebPay();
    };

  }catch(err){spinner.style.display="none";console.error(err);alert("❌ Error al cotizar: "+err.message);}
}

document.getElementById('modalOverlay').addEventListener('click',cerrarModalWebPay);
window.onload=initAutocomplete;
</script>
</body>
</html>
